<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D946EF;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#9D4EDD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </radialGradient>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" fill="#06060C"/>

  <!-- Outer glow layer -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#D946EF" stroke-width="4" opacity="0.3" filter="url(#glowFilter)"/>

  <!-- Main orb -->
  <circle cx="256" cy="256" r="180" fill="url(#orbGradient)" filter="url(#glowFilter)"/>

  <!-- Inner highlight for depth -->
  <circle cx="230" cy="215" r="55" fill="#FFFFFF" opacity="0.15"/>
</svg>